network:
  ecg_model: vit_tiny          # spatial_temporal_vit_tiny  (192-dim, 12 layers)
  num_leads: 12
  seq_len: 5000
  patch_size_per_lead: 500     # 10 time patches × 12 leads = 120 total patches

  # Text encoder: BioClinicalBERT
  text_model: emilyalsentzer/Bio_ClinicalBERT
  free_layers: 9               # freeze first 9 BERT layers during training

  projection_head:
    mlp_hidden_size: 256
    projection_size: 256

  # Semi-UOT hyperparameters
  uot_eps: 0.1                 # entropy regularization
  uot_tau: 1.0                 # KL penalty strength on ECG-patch side
  uot_n_iter: 30               # Sinkhorn iterations

dataset:
  dataset_name: 'mimic'
  data_path: 'your_path/'      # path to preprocessed MIMIC-ECG npy + csv files

trainer:
  batch_size: 100
  val_batch_size: 256
  checkpoint_interval: 1
  max_epochs: 10               # coarse FOCAL; run 3 more epochs for fine FOCAL
  num_workers: 8
  max_tags_per_report: 15      # max tags per report for cross-GPU gather padding

optimizer:
  params:
    lr: 2.0e-5
    weight_decay: 1.0e-4

# Warmup: 10% of total training steps (handled inside FOCALTrainer)

# Zero-shot evaluation
zeroshot:
  prompt_type: 'CKEPE'
  prompt_dict: 'your_path/MERL/zeroshot/CKEPE_prompt.json'
  batch_size: 256
  num_workers: 8
  meta_data_path: 'your_path/downstream'
  meta_split_path: 'your_path/MERL/finetune/data_split'

  val_sets:
    ptbxl_super_class:
      data_path: 'ptbxl'
      split_path: 'ptbxl/super_class/ptbxl_super_class_val.csv'
    ptbxl_sub_class:
      data_path: 'ptbxl'
      split_path: 'ptbxl/sub_class/ptbxl_sub_class_val.csv'
    ptbxl_form:
      data_path: 'ptbxl'
      split_path: 'ptbxl/form/ptbxl_form_val.csv'
    ptbxl_rhythm:
      data_path: 'ptbxl'
      split_path: 'ptbxl/rhythm/ptbxl_rhythm_val.csv'
    icbeb:
      data_path: 'icbeb2018/records500'
      split_path: 'icbeb/icbeb_val.csv'
    chapman:
      data_path: ''
      split_path: 'chapman/chapman_val.csv'

wandb_name: 'focal_vit_tiny'
