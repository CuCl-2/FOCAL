network:
  ecg_model: vit_tiny
  num_leads: 12
  seq_len: 5000
  patch_size_per_lead: 500

  text_model: emilyalsentzer/Bio_ClinicalBERT
  free_layers: 9

  projection_head:
    mlp_hidden_size: 256
    projection_size: 256

  uot_eps: 0.1
  uot_tau: 1.0
  uot_n_iter: 30

# params for zeroshot eval
zeroshot:
  prompt_type: 'CKEPE'
  prompt_dict: 'your_path/FOCAL/zeroshot/CKEPE_prompt.json'
  batch_size: 256
  num_workers: 8
  meta_data_path: 'your_path/downstream'
  meta_split_path: 'your_path/FOCAL/finetune/data_split'

  test_sets:
    ptbxl_super_class:
      data_path: 'ptbxl'
      split_path: 'ptbxl/super_class/ptbxl_super_class_test.csv'
    ptbxl_sub_class:
      data_path: 'ptbxl'
      split_path: 'ptbxl/sub_class/ptbxl_sub_class_test.csv'
    ptbxl_form:
      data_path: 'ptbxl'
      split_path: 'ptbxl/form/ptbxl_form_test.csv'
    ptbxl_rhythm:
      data_path: 'ptbxl'
      split_path: 'ptbxl/rhythm/ptbxl_rhythm_test.csv'
    icbeb:
      data_path: 'icbeb2018/records500'
      split_path: 'icbeb/icbeb_test.csv'
    chapman:
      data_path: ''
      split_path: 'chapman/chapman_test.csv'

wandb_name: 'focal_vit_tiny'
